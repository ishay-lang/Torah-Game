<style>
:root {
  --bg:#0b0600;
  --ink:#1a0d00; --ink2:#4a2e00;

  --red:#6e1010; --redL:#b03030;

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Frank Ruhl Libre',serif;background:var(--bg);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding-bottom:80px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 45% at 15% 10%,rgba(196,131,14,.05),transparent 55%),
    radial-gradient(ellipse 55% 40% at 85% 88%,rgba(110,16,16,.04),transparent 55%)}

.hdr{text-align:center;padding:26px 0 4px}

  text-shadow:0 0 20px var(--goldG),0 2px 3px rgba(0,0,0,.5);margin-top:3px}
.hdr p{font-family:'Heebo',sans-serif;font-size:.78rem;color:rgba(244,227,188,.38);
  margin-top:4px;letter-spacing:.07em}
.div{height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--goldL),var(--gold),transparent);
  margin:12px 0;box-shadow:0 0 8px var(--goldG)}

/* Navigator */
.nav{background:rgba(0,0,0,.3);border:1px solid var(--bord);border-radius:16px;
  padding:16px;margin-bottom:14px}
.bread{font-family:'Heebo',sans-serif;font-size:.78rem;color:rgba(244,227,188,.4);
  margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bread .crumb{cursor:pointer;transition:color .2s}
.bread .crumb:hover,.bread .crumb.active{color:var(--goldL)}
.bread .sep{opacity:.3}

/* Books */
.book-row{display:flex;gap:7px;flex-wrap:wrap}
.book-btn{border:none;border-radius:10px;padding:8px 14px;cursor:pointer;
  font-family:'Frank Ruhl Libre',serif;font-size:.95rem;font-weight:700;
  transition:all .2s;flex:1;min-width:80px;text-align:center;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:rgba(244,227,188,.45)}
.book-btn:hover{transform:translateY(-1px)}
.book-btn.active{color:#fff;transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.3)}
.book-btn[data-book="בראשית"].active{background:var(--bereshit);border-color:rgba(200,120,0,.5)}
.book-btn[data-book="שמות"].active{background:var(--shemot);border-color:rgba(0,100,180,.5)}
.book-btn[data-book="ויקרא"].active{background:var(--vayikra);border-color:rgba(150,30,30,.5)}
.book-btn[data-book="במדבר"].active{background:var(--bamidbar);border-color:rgba(20,100,70,.5)}
.book-btn[data-book="דברים"].active{background:var(--devarim);border-color:rgba(80,30,150,.5)}

/* Parasha grid */
.parasha-grid{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}

/* Parasha card — the key widget for joined parshiyot */
.par-card{position:relative;border-radius:10px;border:1px solid var(--bord);
  background:rgba(255,255,255,.04);transition:all .2s;cursor:pointer}
.par-card:hover{border-color:rgba(196,131,14,.5)}
.par-card.active{background:rgba(196,131,14,.18);border-color:var(--goldL)}
/* single parasha */
.par-card.single{padding:7px 13px}
.par-card.single .par-name{font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:700;
  color:rgba(244,227,188,.55);transition:color .2s;display:block}
.par-card.single.active .par-name{color:var(--goldL)}
.par-card.single .par-cnt{font-size:.65rem;opacity:.5;font-weight:400;display:block;margin-top:1px;
  font-family:'Heebo',sans-serif}
/* joined parasha — split into two halves */
.par-card.joined{padding:0;overflow:hidden;display:flex;flex-direction:column}
.par-card.joined .joined-label{font-family:'Heebo',sans-serif;font-size:.68rem;
  color:rgba(196,131,14,.6);text-align:center;padding:4px 10px 2px;
  border-bottom:1px solid rgba(196,131,14,.15);letter-spacing:.05em}
.par-card.joined .join-halves{display:flex}
.par-half{flex:1;padding:6px 10px;cursor:pointer;transition:all .2s;text-align:center;
  border:none;background:transparent;font-family:'Heebo',sans-serif}
.par-half:first-child{border-left:1px solid rgba(196,131,14,.15)}
.par-half:hover{background:rgba(196,131,14,.12)}
.par-half.active{background:rgba(196,131,14,.25)}
.par-half .ph-name{font-size:.82rem;font-weight:700;color:rgba(244,227,188,.55);
  display:block;transition:color .2s}
.par-half.active .ph-name{color:var(--goldL)}
.par-half .ph-cnt{font-size:.62rem;color:rgba(244,227,188,.35);display:block;margin-top:1px}
.par-card.joined .join-btn{width:100%;padding:4px 8px;border:none;background:transparent;
  cursor:pointer;font-family:'Heebo',sans-serif;font-size:.68rem;
  color:rgba(196,131,14,.5);border-top:1px solid rgba(196,131,14,.12);
  transition:all .2s;letter-spacing:.03em}
.par-card.joined .join-btn:hover{background:rgba(196,131,14,.1);color:var(--goldL)}
.par-card.joined.active-joined .join-btn{background:rgba(196,131,14,.18);color:var(--goldL)}

/* Aliyah row */
.aliyah-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.al-btn{background:rgba(255,255,255,.04);border:1px solid var(--bord);
  border-radius:9px;padding:6px 14px;cursor:pointer;
  font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:700;
  color:rgba(244,227,188,.45);transition:all .2s;white-space:nowrap}
.al-btn:hover{border-color:var(--gold);color:rgba(244,227,188,.8)}
.al-btn.active{background:rgba(196,131,14,.22);border-color:var(--goldL);color:var(--goldL)}
.al-btn.all-btn{border-style:dashed}
.al-btn .ac{font-size:.65rem;opacity:.5;font-weight:400;display:block;margin-top:1px}

/* Aliyah section header (when merged view) */
.al-section-hdr{font-family:'Heebo',sans-serif;font-size:.72rem;
  color:rgba(196,131,14,.5);margin-top:8px;margin-bottom:2px;padding-right:2px;
  letter-spacing:.05em;display:none}
.al-section-hdr.show{display:block}

/* Upload */
.upload-zone{margin-top:10px;border:1.5px dashed rgba(196,131,14,.25);
  border-radius:10px;padding:10px 14px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer;
  transition:all .2s;position:relative;background:rgba(255,255,255,.01)}
.upload-zone:hover{border-color:var(--gold);background:rgba(196,131,14,.05)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.upload-zone .u-icon{font-size:1.3rem}
.upload-zone .u-text{font-family:'Heebo',sans-serif;font-size:.8rem;
  color:rgba(244,227,188,.45);line-height:1.4}
.upload-zone .u-text strong{color:rgba(244,227,188,.75);display:block}

/* Mode */
.mode-row{display:flex;gap:0;margin-bottom:11px;background:rgba(255,255,255,.03);
  border:1px solid var(--bord);border-radius:12px;overflow:hidden}
.mTab{flex:1;padding:9px 8px;background:transparent;border:none;cursor:pointer;
  font-family:'Heebo',sans-serif;font-size:.8rem;font-weight:700;
  color:rgba(244,227,188,.35);transition:all .2s;text-align:center}
.mTab:not(:last-child){border-left:1px solid var(--bord)}
.mTab.active{background:rgba(196,131,14,.18);color:var(--goldL)}
.mTab:hover:not(.active){background:rgba(196,131,14,.06);color:rgba(244,227,188,.65)}

/* Stats */
.stats{display:flex;gap:7px;margin-bottom:10px}
.stat{flex:1;background:var(--panel);border:1px solid var(--bord);
  border-radius:10px;padding:6px 7px;text-align:center}
.stat .v{display:block;font-size:1.4rem;font-weight:900;color:var(--goldL);line-height:1}
.stat .l{display:block;font-family:'Heebo',sans-serif;font-size:.62rem;
  color:rgba(244,227,188,.35);margin-top:2px}
.prog{height:5px;background:rgba(255,255,255,.06);border-radius:3px;
  margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--gold),var(--goldL));
  border-radius:3px;transition:width .45s cubic-bezier(.4,0,.2,1);box-shadow:0 0 7px var(--goldG)}

/* Card */
.card{background:linear-gradient(150deg,var(--parch) 0%,var(--parch2) 50%,var(--parch3) 100%);
  border-radius:20px;padding:clamp(20px,4vw,36px) clamp(16px,4vw,34px);
  box-shadow:0 0 0 1px rgba(196,131,14,.32),0 10px 44px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.28);
  position:relative;overflow:hidden;min-height:260px}
.card::before{content:'';position:absolute;inset:0;border-radius:20px;pointer-events:none;
  background:radial-gradient(circle at 8% 8%,rgba(255,255,255,.14),transparent 36%),
    repeating-linear-gradient(135deg,transparent,transparent 26px,rgba(201,168,92,.05) 26px,rgba(201,168,92,.05) 27px)}
.empty-state{text-align:center;padding:40px 20px;font-family:'Heebo',sans-serif;color:rgba(26,13,0,.45)}
.empty-state .ei{font-size:3rem;display:block;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:.95rem}

.p-meta{font-family:'Heebo',sans-serif;font-size:.73rem;color:var(--ink2);
  letter-spacing:.07em;margin-bottom:11px;display:flex;align-items:center;
  gap:9px;opacity:.7;flex-wrap:wrap}
.p-meta .ref{margin-right:auto}
.badge{background:rgba(110,16,16,.1);border:1px solid rgba(110,16,16,.15);
  border-radius:20px;padding:2px 9px;font-size:.68rem;color:var(--red)}
.p-badge{background:rgba(26,13,0,.08);border:1px solid rgba(26,13,0,.12);
  border-radius:20px;padding:2px 9px;font-size:.68rem;color:var(--ink2)}
.p-text{font-size:clamp(1.35rem,3.6vw,2.15rem);color:var(--ink);line-height:2.15;
  direction:rtl;text-align:center;margin-bottom:4px;position:relative;z-index:1}
.bl{display:inline-block;min-width:75px;border-bottom:3px solid var(--red);
  padding:0 4px 1px;color:transparent;transition:all .3s;vertical-align:bottom}
.bl.ok{color:var(--ok);border-color:var(--okL)}
.bl.bad{color:var(--red);border-color:var(--redL)}

.ilabel{font-family:'Heebo',sans-serif;font-size:.79rem;color:var(--ink2);
  margin:16px 0 6px;opacity:.8;display:block}
.irow{display:flex;gap:8px}
.ai{flex:1;background:rgba(255,255,255,.5);border:2px solid rgba(26,13,0,.15);
  border-radius:11px;padding:11px 15px;font-family:'Frank Ruhl Libre',serif;
  font-size:1.28rem;color:var(--ink);direction:rtl;text-align:center;outline:none;
  transition:all .2s;box-shadow:inset 0 2px 4px rgba(0,0,0,.05)}
.ai:focus{border-color:var(--gold);background:rgba(255,255,255,.72);box-shadow:0 0 0 3px rgba(196,131,14,.1)}
.ai.c{border-color:var(--okL);background:rgba(46,170,46,.08)}
.ai.w{border-color:var(--redL);background:rgba(176,48,48,.07);animation:shk .35s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.cb{background:linear-gradient(135deg,var(--gold),var(--goldL));border:none;
  border-radius:11px;padding:11px 18px;font-family:'Heebo',sans-serif;
  font-size:.93rem;font-weight:700;color:var(--ink);cursor:pointer;white-space:nowrap;
  box-shadow:0 3px 9px rgba(196,131,14,.26);transition:all .2s}
.cb:hover{transform:translateY(-2px)}
.cb:disabled{opacity:.42;cursor:default;transform:none}
.hint-row{display:flex;align-items:center;gap:11px;margin-top:8px}
.hbtn{background:transparent;border:1px solid rgba(26,13,0,.17);border-radius:7px;
  padding:4px 10px;font-family:'Heebo',sans-serif;font-size:.76rem;
  color:var(--ink2);cursor:pointer;transition:all .2s}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.ht{font-family:'Heebo',sans-serif;font-size:.79rem;color:var(--red);display:none}
.ht.show{display:inline}
.fb{margin-top:14px;padding:10px 15px;border-radius:11px;font-family:'Heebo',sans-serif;
  font-size:.95rem;font-weight:700;text-align:center;display:none}
.fb.show{display:block;animation:fu .28s}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fb.ok{background:rgba(46,170,46,.13);border:1px solid var(--okL);color:var(--ok)}
.fb.bad{background:rgba(176,48,48,.11);border:1px solid var(--redL);color:var(--red)}
.nb{display:none;margin:16px auto 0;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  border:none;border-radius:50px;padding:11px 44px;
  font-family:'Frank Ruhl Libre',serif;font-size:.98rem;font-weight:700;
  color:var(--ink);cursor:pointer;box-shadow:0 4px 13px rgba(196,131,14,.3);transition:all .25s}
.nb:hover{transform:translateY(-2px)}
.nb.show{display:block}

/* End */
.end{text-align:center;padding:36px 20px;display:none}
.end.show{display:block}
.end .tr{font-size:4.2rem;display:block;margin-bottom:11px;animation:bob 1.2s ease infinite alternate}
@keyframes bob{from{transform:translateY(0)rotate(-2deg)}to{transform:translateY(-10px)rotate(2deg)}}
.esc{font-size:2.8rem;font-weight:900;color:var(--goldL);text-shadow:0 0 16px var(--goldG)}
.est{font-size:1.6rem;letter-spacing:4px;margin:4px 0}
.elb{font-family:'Heebo',sans-serif;font-size:.98rem;color:var(--ink2);margin:8px 0 4px}
.emg{font-family:'Heebo',sans-serif;font-size:.9rem;color:var(--ink2);opacity:.75;margin-bottom:22px}
.rbtn{background:linear-gradient(135deg,var(--red),var(--redL));border:none;
  border-radius:50px;padding:11px 38px;font-family:'Frank Ruhl Libre',serif;
  font-size:.98rem;font-weight:700;color:#fff;cursor:pointer;
  box-shadow:0 4px 13px rgba(110,16,16,.36);transition:all .25s;margin:0 5px}
.rbtn:hover{transform:translateY(-2px)}
.nbtn{background:linear-gradient(135deg,var(--gold),var(--goldL));border:none;
  border-radius:50px;padding:11px 28px;font-family:'Frank Ruhl Libre',serif;
  font-size:.98rem;font-weight:700;color:var(--ink);cursor:pointer;
  box-shadow:0 4px 13px rgba(196,131,14,.3);transition:all .25s;margin:0 5px}
.nbtn:hover{transform:translateY(-2px)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(68px);
  background:var(--ink);color:var(--goldL);border:1px solid rgba(196,131,14,.28);
  font-family:'Heebo',sans-serif;font-size:.86rem;font-weight:700;
  padding:8px 20px;border-radius:50px;box-shadow:0 4px 16px rgba(0,0,0,.42);
  transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:200;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:500px){
  .irow{flex-direction:column}.cb{padding:11px}
  .mode-row .mTab{font-size:.74rem;padding:8px 3px}
  .book-btn{font-size:.82rem;padding:7px 8px}
}
</style>
</head>
<body>
<div class="w">

<div class="hdr">
  <span class="crown">✡</span>
  <h1>תרגול קריאת התורה</h1>
  <p>השלם מילה • זהה טעמי מקרא • לכל ספר, פרשה ועלייה</p>
</div>
<div class="div"></div>

<div class="nav">
  <div class="bread" id="bread">
    <span class="crumb active" onclick="resetNav()">📚 כל התורה</span>
  </div>
  <div class="book-row" id="bookRow">
    <button class="book-btn" data-book="בראשית" onclick="selectBook('בראשית',this)">בראשית</button>
    <button class="book-btn" data-book="שמות"    onclick="selectBook('שמות',this)">שמות</button>
    <button class="book-btn" data-book="ויקרא"   onclick="selectBook('ויקרא',this)">ויקרא</button>
    <button class="book-btn" data-book="במדבר"   onclick="selectBook('במדבר',this)">במדבר</button>
    <button class="book-btn" data-book="דברים"   onclick="selectBook('דברים',this)">דברים</button>
  </div>
  <div class="parasha-grid" id="parashaGrid" style="display:none"></div>

  <!-- Aliyah row — has two optional section headers for merged parshiyot -->
  <div id="aliyahWrap" style="display:none">
    <div class="al-section-hdr" id="alHdrA"></div>
    <div class="aliyah-row" id="aliyahRowA"></div>
    <div class="al-section-hdr" id="alHdrB"></div>
    <div class="aliyah-row" id="aliyahRowB"></div>
  </div>

  <div class="upload-zone">
    <input type="file" accept=".txt,.json" multiple onchange="handleUpload(this)">
    <span class="u-icon">📂</span>
    <div class="u-text">
      <strong>העלה קבצי פרשות</strong>
      ניתן להעלות מספר קבצים בבת אחת — פורמט {א} {ב}... עם שמות עליות
    </div>
  </div>
</div>

<div class="mode-row">
  <div class="mTab active" onclick="setMode('word',this)">📝 השלם מילה</div>
  <div class="mTab" onclick="setMode('taam',this)">🎼 טעם המקרא</div>
  <div class="mTab" onclick="setMode('both',this)">✨ שניהם</div>
</div>

<div class="stats">
  <div class="stat"><span class="v" id="sScore">0</span><span class="l">ניקוד</span></div>
  <div class="stat"><span class="v" id="sStreak">0</span><span class="l">רצף 🔥</span></div>
  <div class="stat"><span class="v" id="sOk">0</span><span class="l">נכון ✓</span></div>
  <div class="stat"><span class="v" id="sQ">–</span><span class="l">שאלה</span></div>
</div>
<div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>

<div class="card">
  <div id="qv">
    <div class="p-meta">
      <span id="mMode">📝 השלם מילה</span>
      <span class="ref" id="mRef"></span>
      <span class="p-badge" id="mPar"></span>
      <span class="badge" id="mAl"></span>
    </div>
    <div class="p-text" id="pText">
      <div class="empty-state">
        <span class="ei">📜</span>
        <p>בחר ספר, פרשה ועלייה כדי להתחיל</p>
      </div>
    </div>
    <label class="ilabel" id="ilabel" style="display:none"></label>
    <div class="irow" id="irow" style="display:none">
      <input type="text" class="ai" id="ai" placeholder="הקלד כאן..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')check()">
      <button class="cb" id="cb" onclick="check()">בדוק ✓</button>
    </div>
    <div class="hint-row" id="hintRow" style="display:none">
      <button class="hbtn" onclick="hint()">💡 רמז</button>
      <span class="ht" id="ht"></span>
    </div>
    <div class="fb" id="fb"></div>
    <button class="nb" id="nb" onclick="nextQ()">הבא ←</button>
  </div>
  <div class="end" id="ev">
    <span class="tr" id="eTr">🏆</span>
    <div class="esc" id="eSc"></div>
    <div class="est" id="eSt"></div>
    <div class="elb" id="eLb"></div>
    <div class="emg" id="eMg"></div>
    <div>
      <button class="rbtn" onclick="restart()">שחק שוב 🔄</button>
      <button class="nbtn" onclick="goChoose()">בחר עלייה אחרת</button>
    </div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
//  DB:  { book → { parasha → { aliyah → [verses] } } }
//
//  PAIRED parshiyot: DB has BOTH individual entries AND a
//  combined entry with key "P1+P2".
//  e.g.  DB['שמות']['ויקהל']         = { ראשון:[...], שני:[...] }
//        DB['שמות']['פקודי']          = { שלישי:[...], ... }
//        DB['שמות']['ויקהל-פקודי']    = merged view (virtual, built on demand)
//
//  PAIRED_MAP: maps combined key → [p1, p2]
// ════════════════════════════════════════════════════
const DB = {};

// Known pairs (always shown when both halves loaded)
const KNOWN_PAIRS = [
  ['ויקהל','פקודי'],
  ['תזריע','מצורע'],
  ['אחרי מות','קדושים'],
  ['בהר','בחוקותי'],
  ['חקת','בלק'],
  ['מטות','מסעי'],
  ['נצבים','וילך'],
];
// Map: "p1+p2" → [p1, p2]
const PAIR_MAP = {};
KNOWN_PAIRS.forEach(([a,b]) => { PAIR_MAP[a+'+'+b] = [a,b]; });

const ALIYAH_ORDER = ['ראשון','שני','שלישי','רביעי','חמישי','ששי','שביעי','מפטיר'];
const ALIYAH_DETECT = ['שני','שלישי','רביעי','חמישי','ששי','שביעי','מפטיר'];
const TAAM_MAP = {
  '\u0591':'אתנחתא','\u0592':'סגול','\u0593':'שלשלת',
  '\u0594':'זקף קטן','\u0595':'זקף גדול','\u0596':'טפחא',
  '\u0597':'רביע','\u0598':'זרקא','\u0599':'פשטא',
  '\u059a':'יתיב','\u059b':'תביר','\u059d':'גרש','\u059e':'גרשים',
  '\u05a0':'תלשא גדולה','\u05a1':'פזר','\u05a3':'מונח','\u05a4':'מהפך',
  '\u05a5':'מרכא','\u05a7':'דרגא','\u05a8':'קדמא','\u05a9':'תלשא קטנה',
  '\u05ab':'אולה','\u05ac':'אילוי',
};
const MAJOR_TAAMIM = ['\u0591','\u0594','\u0595','\u0596','\u0598','\u0597'];
const HEB_NUM = {'א':1,'ב':2,'ג':3,'ד':4,'ה':5,'ו':6,'ז':7,'ח':8,'ט':9,
  'י':10,'יא':11,'יב':12,'יג':13,'יד':14,'טו':15,'טז':16,'יז':17,'יח':18,
  'יט':19,'כ':20,'כא':21,'כב':22,'כג':23,'כד':24,'כה':25,'כו':26,'כז':27,
  'כח':28,'כט':29,'ל':30,'לא':31,'לב':32,'לג':33,'לד':34,'לה':35,'לו':36,
  'לז':37,'לח':38,'לט':39,'מ':40,'מא':41,'מב':42,'מג':43,'מד':44,'מה':45};

//  STORAGE
// ════════════════════════════════════════════════════
function storeVerses(book, parasha, verses) {
  if (!DB[book]) DB[book] = {};
  if (!DB[book][parasha]) DB[book][parasha] = {};
  verses.forEach(v => {
    const al = v.aliyah || 'ראשון';
    if (!DB[book][parasha][al]) DB[book][parasha][al] = [];
    if (!DB[book][parasha][al].find(x => x.ref===v.ref && x.num===v.num))
      DB[book][parasha][al].push(v);
  });
  
updateBookButtons();
}

// Return [p1,p2] if both halves exist in the given book, else null
function getPairFor(book, parasha) {
  for (const [a,b] of KNOWN_PAIRS) {
    if (parasha===a && DB[book]?.[b]) return [a,b];
    if (parasha===b && DB[book]?.[a]) return [a,b];
  }
  return null;
}

// Get verses for a combined pair key "p1+p2"
function getMergedVerses(book, key, aliyah) {
  const [p1,p2] = PAIR_MAP[key];
  const v1 = DB[book]?.[p1] || {};
  const v2 = DB[book]?.[p2] || {};
  if (aliyah === 'ALL' || aliyah === null) return [...Object.values(v1).flat(), ...Object.values(v2).flat()];
  // aliyah might be "ראשון@ויקהל" format (see below)
  const [al, src] = aliyah.split('@');
  if (src) {
    const d = src === p1 ? v1 : v2;
    return (d[al] || []);
  }
  return (v1[aliyah] || []).concat(v2[aliyah] || []);
}

function updateBookButtons() {
  document.querySelectorAll('.book-btn').forEach(btn => {
    const book = btn.dataset.book;
    const has = DB[book] && Object.keys(DB[book]).length > 0;
    btn.style.opacity = has ? '1' : '0.45';
  });
}

let selBook=null, selParasha=null, selAliyah=undefined;
// selParasha can be "ויקהל" (single), "ויקהל+פקודי" (joined)
// selAliyah can be: null (all), "ראשון", "שני@ויקהל", etc.

function resetNav() {
  selBook=null; selParasha=null; selAliyah=undefined;
  document.querySelectorAll('.book-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('parashaGrid').style.display='none';
  document.getElementById('aliyahWrap').style.display='none';
  updateBread(); showEmpty();
}

function selectBook(book, el) {
  if (!DB[book]) { toast('אין נתונים — העלה קובץ'); return; }
  selBook=book; selParasha=null; selAliyah=undefined;
  document.querySelectorAll('.book-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderParashaGrid();
  document.getElementById('aliyahWrap').style.display='none';
  updateBread(); showEmpty();
}

function renderParashaGrid() {
  const grid = document.getElementById('parashaGrid');
  if (!selBook || !DB[selBook]) { grid.style.display='none'; return; }

  // Build list of parasha cards: singles and pairs
  const parashiyot = Object.keys(DB[selBook]);
  const usedInPair = new Set();
  const cards = []; // {type:'single',name} or {type:'joined',p1,p2,key}

  // First pass: find pairs
  KNOWN_PAIRS.forEach(([a,b]) => {
    if (parashiyot.includes(a) && parashiyot.includes(b)) {
      usedInPair.add(a); usedInPair.add(b);
      cards.push({type:'joined', p1:a, p2:b, key:a+'+'+b});
    }
  });
  // Second pass: singles
  parashiyot.forEach(p => {
    if (!usedInPair.has(p)) cards.push({type:'single', name:p});
  });

  grid.innerHTML = '';
  cards.forEach(card => {
    if (card.type === 'single') {
      const total = Object.values(DB[selBook][card.name]).flat().length;
      const alCnt = Object.keys(DB[selBook][card.name]).length;
      const div = document.createElement('div');
      div.className = 'par-card single' + (selParasha===card.name?' active':'');
      div.innerHTML = `<span class="par-name">${card.name}</span>
        <span class="par-cnt">${alCnt} עליות • ${total} פס׳</span>`;
      div.onclick = () => selectParasha(card.name, div);
      grid.appendChild(div);
    } else {
      // joined card
      const t1 = Object.values(DB[selBook][card.p1]).flat().length;
      const t2 = Object.values(DB[selBook][card.p2]).flat().length;
      const a1 = Object.keys(DB[selBook][card.p1]).length;
      const a2 = Object.keys(DB[selBook][card.p2]).length;
      const isJoinedActive = selParasha === card.key;
      const div = document.createElement('div');
      div.className = 'par-card joined' + (isJoinedActive?' active-joined':'');
      div.innerHTML = `
        <div class="joined-label">פרשות מחוברות / נפרדות</div>
        <div class="join-halves">
          <button class="par-half${selParasha===card.p2?' active':''}" onclick="selectParasha('${card.p2}',this.closest('.par-card'))">
            <span class="ph-name">${card.p2}</span>
            <span class="ph-cnt">${a2} עליות • ${t2} פס׳</span>
          </button>
          <button class="par-half${selParasha===card.p1?' active':''}" onclick="selectParasha('${card.p1}',this.closest('.par-card'))">
            <span class="ph-name">${card.p1}</span>
            <span class="ph-cnt">${a1} עליות • ${t1} פס׳</span>
          </button>
        </div>
        <button class="join-btn" onclick="selectParasha('${card.key}',this.closest('.par-card'))">
          ✦ ${card.p1}–${card.p2} מחוברות (${a1+a2} עליות • ${t1+t2} פס׳)
        </button>`;
      grid.appendChild(div);
    }
  });
  grid.style.display='flex';
}

function selectParasha(par, cardEl) {
  selParasha=par; selAliyah=undefined;
  // Update active state on cards
  document.querySelectorAll('.par-card').forEach(c=>{
    c.classList.remove('active','active-joined');
  });
  document.querySelectorAll('.par-half').forEach(h=>h.classList.remove('active'));

  if (PAIR_MAP[par]) {
    cardEl.classList.add('active-joined');
  } else {
    // find if this card is a par-half
    if (cardEl.classList.contains('par-half')) {
      cardEl.classList.add('active');
    } else {
      cardEl.classList.add('active');
    }
  }
  renderAliyahRow();
  updateBread(); showEmpty();
}

function renderAliyahRow() {
  const wrap = document.getElementById('aliyahWrap');
  const rowA = document.getElementById('aliyahRowA');
  const rowB = document.getElementById('aliyahRowB');
  const hdrA = document.getElementById('alHdrA');
  const hdrB = document.getElementById('alHdrB');
  rowA.innerHTML=''; rowB.innerHTML='';
  hdrA.className='al-section-hdr'; hdrB.className='al-section-hdr';

  if (!selParasha) { wrap.style.display='none'; return; }

  const isPair = !!PAIR_MAP[selParasha];

  // Helper: build aliyah buttons into a row element
  function buildRow(row, aliyot, tag, totalAll) {
    // "All" button
    const all = document.createElement('button');
    all.className = 'al-btn all-btn' + (!selAliyah && (!tag || selParasha===tag)?' active':'');
    all.innerHTML = `כל${tag?' ה'+tag:''}${tag?'':' הפרשה'}<span class="ac">${totalAll} פסוקים</span>`;
    all.onclick = () => selectAliyah('ALL', all, tag);
    row.appendChild(all);

    const sorted = aliyot.sort((a,b)=>ALIYAH_ORDER.indexOf(a)-ALIYAH_ORDER.indexOf(b));
    sorted.forEach(al => {
      let cnt, alKey;
      if (isPair) {
        // tag is p1 or p2
        cnt = DB[selBook][tag][al].length;
        alKey = al + '@' + tag; // scoped aliyah
      } else {
        cnt = DB[selBook][selParasha][al].length;
        alKey = al;
      }
      const btn = document.createElement('button');
      btn.className = 'al-btn' + (selAliyah===alKey?' active':'');
      btn.innerHTML = `עלייה ${al}<span class="ac">${cnt} פסוקים</span>`;
      btn.onclick = () => selectAliyah(alKey, btn, tag);
      row.appendChild(btn);
    });
  }

  if (isPair) {
    const [p1,p2] = PAIR_MAP[selParasha];
    const al1 = Object.keys(DB[selBook][p1]||{});
    const al2 = Object.keys(DB[selBook][p2]||{});
    const t1 = Object.values(DB[selBook][p1]||{}).flat().length;
    const t2 = Object.values(DB[selBook][p2]||{}).flat().length;
    const tAll = t1+t2;

    // Top: "all combined" button
    const allMerged = document.createElement('button');
    allMerged.className = 'al-btn all-btn' + (selAliyah===null?' active':'');
    allMerged.innerHTML = `כל המחוברות<span class="ac">${tAll} פסוקים</span>`;
    allMerged.onclick = () => selectAliyah('ALL', allMerged, null);
    rowA.appendChild(allMerged);

    hdrA.textContent = '◂ ' + p1;
    hdrA.className = 'al-section-hdr show';
    buildRow(rowA, al1, p1, t1);

    hdrB.textContent = '◂ ' + p2;
    hdrB.className = 'al-section-hdr show';
    buildRow(rowB, al2, p2, t2);
  } else {
    const aliyot = Object.keys(DB[selBook]?.[selParasha]||{});
    const total = Object.values(DB[selBook]?.[selParasha]||{}).flat().length;
    buildRow(rowA, aliyot, null, total);
  }

  wrap.style.display='block';
}

function selectAliyah(alKey, el, tag) {
  selAliyah = alKey;
  document.querySelectorAll('.al-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  updateBread(); restart();
}

function updateBread() {
  const b = document.getElementById('bread');
  let html = `<span class="crumb" onclick="resetNav()">📚 כל התורה</span>`;
  if (selBook) html += `<span class="sep">›</span><span class="crumb" onclick="selectBook('${selBook}',document.querySelector('[data-book=${selBook}]'))">${selBook}</span>`;
  if (selParasha) {
    const label = PAIR_MAP[selParasha] ? selParasha.replace('+','–') : selParasha;
    html += `<span class="sep">›</span><span class="crumb active">${label}</span>`;
  }
  if (selAliyah && selAliyah !== 'ALL') {
    const [al] = selAliyah.split('@');
    html += `<span class="sep">›</span><span class="crumb active">עלייה ${al}</span>`;
  }
  b.innerHTML = html;
}

let mode='word', curMode='word';
let pool=[], score=0, streak=0, ok=0, qNum=0;
let cur=null, answered=false, hintOn=false;

function setMode(m,el){
  mode=m;
  document.querySelectorAll('.mTab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(pool.length) restart();
}

function getPool() {
  if (!selBook || !selParasha || selAliyah === undefined) return [];
  const isPair = !!PAIR_MAP[selParasha];
  if (isPair) {
    if (selAliyah === 'ALL') return getMergedVerses(selBook, selParasha, null);
    return getMergedVerses(selBook, selParasha, selAliyah);
  } else {
    const d = DB[selBook]?.[selParasha];
    if (!d) return [];
    if (selAliyah === 'ALL') return Object.values(d).flat();
    return d[selAliyah] || [];
  }
}

function showEmpty() {
  document.getElementById('pText').innerHTML=
    `<div class="empty-state"><span class="ei">📜</span><p>בחר עלייה כדי להתחיל את התרגול</p></div>`;
  document.getElementById('ilabel').style.display='none';
  document.getElementById('irow').style.display='none';
  document.getElementById('hintRow').style.display='none';
  document.getElementById('fb').className='fb';
  document.getElementById('nb').classList.remove('show');
  document.getElementById('ev').classList.remove('show');
  document.getElementById('qv').style.display='';
  pool=[]; updateStats();
}

function restart() {
  pool=getPool();
  if(!pool.length){showEmpty();return;}
  score=0;streak=0;ok=0;qNum=0;answered=false;
  updateStats();
  document.getElementById('ev').classList.remove('show');
  document.getElementById('qv').style.display='';
  document.getElementById('pf').style.width='0%';
  document.getElementById('fb').className='fb';
  document.getElementById('ht').className='ht';
  document.getElementById('ilabel').style.display='block';
  document.getElementById('irow').style.display='flex';
  document.getElementById('hintRow').style.display='flex';
  const ai=document.getElementById('ai'); ai.value=''; ai.className='ai';
  const nb=document.getElementById('nb'); nb.textContent='התחל ▶'; nb.classList.add('show');
}

function nextQ(){
  if(qNum>=pool.length){showEnd();return;}
  answered=false;hintOn=false;
  qNum++;
  updateStats();
  document.getElementById('pf').style.width=((qNum-1)/pool.length*100)+'%';
  document.getElementById('fb').className='fb';
  document.getElementById('nb').classList.remove('show');
  document.getElementById('ht').className='ht';
  const ai=document.getElementById('ai'); ai.value=''; ai.className='ai'; ai.disabled=false;
  document.getElementById('cb').disabled=false;
  cur=pool[qNum-1];
  curMode=mode==='both'?(Math.random()<.5?'word':'taam'):mode;
  render();
  setTimeout(()=>ai.focus(),80);
}

function render(){
  const v=cur;
  const words=v.text.split(' ');
  const bi=v.blank_idx||0;
  document.getElementById('pText').innerHTML=
    words.map((w,i)=>i===bi?`<span class="bl" id="blk">${w}</span>`:w).join(' ');
  document.getElementById('mRef').textContent=v.ref;
  document.getElementById('mPar').textContent=v.aliyah?'עלייה '+v.aliyah:'';
  // Show parasha name in badge when merged
  const pLabel = PAIR_MAP[selParasha]
    ? (v.ref.startsWith('לה')||v.ref.startsWith('לו')||v.ref.startsWith('לז')||v.ref.startsWith('לח') ? 'ויקהל' : 'פקודי')
    : (selParasha||'');
  document.getElementById('mAl').textContent=pLabel;
  const ml={word:'📝 השלם מילה',taam:'🎼 טעם המקרא'};
  document.getElementById('mMode').textContent=ml[curMode];
  document.getElementById('ilabel').textContent=
    curMode==='word'?'הקלד את המילה החסרה (עם או בלי ניקוד):':'מה שם הטעם של המילה המסומנת?';
  document.getElementById('ai').placeholder=curMode==='word'?'הקלד מילה...':'שם הטעם...';
  document.getElementById('ht').textContent=
    curMode==='word'?(v.taam?'הטעם של המילה: '+v.taam:'שים לב להקשר'):'שים לב לסימן הטעם';
}

function check(){
  if(answered)return;
  const raw=document.getElementById('ai').value.trim();
  if(!raw){wiggle();return;}
  answered=true;
  document.getElementById('ai').disabled=true;
  document.getElementById('cb').disabled=true;
  const correct=curMode==='word'?cur.blank_word:cur.taam;
  const good=fuzzy(raw,correct||'');
  const blk=document.getElementById('blk');
  const ai=document.getElementById('ai');
  if(good){
    const pts=streak>=3?20:10;score+=pts;streak++;ok++;
    ai.classList.add('c');
    if(blk){blk.textContent=correct;blk.className='bl ok';}
    showFb(true,`✅ נכון!${streak>=3?' 🔥 +'+pts:' +'+pts}`,correct);
  } else {
    streak=0;ai.classList.add('w');
    if(blk){blk.textContent=correct;blk.className='bl bad';}
    showFb(false,'❌ לא נכון — התשובה:',correct);
  }
  updateStats();
  const nb=document.getElementById('nb');
  nb.textContent=qNum>=pool.length?'סיום 🏁':'הבא ←';
  nb.classList.add('show');
}

function fuzzy(a,b){
  const c=s=>s.replace(/[\u0591-\u05c7]/g,'').replace(/-/g,'').trim();
  return c(a)===c(b)||a.trim()===b.trim();
}
function wiggle(){const ai=document.getElementById('ai');ai.classList.add('w');setTimeout(()=>ai.classList.remove('w'),380);}
function showFb(g,msg,ans){
  const fb=document.getElementById('fb');
  fb.className='fb show '+(g?'ok':'bad');
  fb.innerHTML=g?`${msg} <span style="font-size:1.05em">${ans}</span>`:`${msg} <strong>${ans}</strong>`;
}
function hint(){
  hintOn=!hintOn;
  document.getElementById('ht').classList.toggle('show',hintOn);
  if(hintOn&&!answered){score=Math.max(0,score-2);updateStats();}
}
function updateStats(){
  document.getElementById('sScore').textContent=score;
  document.getElementById('sStreak').textContent=streak;
  document.getElementById('sOk').textContent=ok;
  document.getElementById('sQ').textContent=pool.length?qNum+'/'+pool.length:'–';
}
function showEnd(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('qv').style.display='none';
  const pct=ok/pool.length;
  document.getElementById('eTr').textContent=pct>=.8?'🏆':pct>=.5?'✡️':'📖';
  document.getElementById('eSc').textContent=score+' נקודות';
  document.getElementById('eSt').textContent=pct>=.9?'★★★':pct>=.6?'★★☆':'★☆☆';
  document.getElementById('eLb').textContent=ok+' נכון מתוך '+pool.length;
  document.getElementById('eMg').textContent=
    pct>=.9?'מצוין! תורתך אמנותך! 📜':pct>=.6?'כל הכבוד! המשך לחזור!':'אל תתייאש — חזרה היא עיקר!';
  document.getElementById('ev').classList.add('show');
}
function goChoose(){
  document.getElementById('ev').classList.remove('show');
  document.getElementById('qv').style.display='';
  showEmpty();
}

function handleUpload(input) {
  const files=Array.from(input.files); if(!files.length)return;
  let done=0;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      try {
        const txt=e.target.result;
        let parsed;
        if(txt.trim().startsWith('[')){
          const arr=JSON.parse(txt);
          // detect book/parasha from content or filename
          parsed=inferBookParasha(arr,f.name);
        } else {
          parsed=parseTorahText(txt,f.name);
        }
        if(parsed?.verses?.length){
          storeVerses(parsed.book,parsed.parasha,parsed.verses);
          done++;
          if(done===files.length){
            toast(`✅ נטענו ${files.length} קבצים`);
            if(selBook) renderParashaGrid();
          }
        } else toast(`⚠️ ${f.name}: לא נמצאו פסוקים`);
      } catch(err){toast(`⚠️ שגיאה: ${f.name}`);console.error(err);}
    };
    r.readAsText(f,'UTF-8');
  });
}

function inferBookParasha(arr,filename){
  const BOOKS=['בראשית','שמות','ויקרא','במדבר','דברים'];
  const PARASHIYOT=['בראשית','נח','לך לך','וירא','חיי שרה','תולדות','ויצא','וישלח','וישב',
    'מקץ','ויגש','ויחי','שמות','וארא','בא','בשלח','יתרו','משפטים','תרומה','תצוה',
    'כי תשא','ויקהל','פקודי','ויקרא','צו','שמיני','תזריע','מצורע',
    'אחרי מות','קדושים','אמור','בהר','בחוקותי','במדבר','נשא','בהעלותך','שלח',
    'קרח','חקת','בלק','פינחס','מטות','מסעי','דברים','ואתחנן','עקב','ראה',
    'שופטים','כי תצא','כי תבוא','נצבים','וילך','האזינו','וזאת הברכה'];
  let book='שמות', parasha='לא ידוע';
  for(const b of BOOKS) if(filename.includes(b)){book=b;break;}
  for(const p of PARASHIYOT) if(filename.includes(p)){parasha=p;break;}
  return {book,parasha,verses:arr};
}

function parseTorahText(text,filename){
  const BOOKS=['בראשית','שמות','ויקרא','במדבר','דברים'];
  const PARASHIYOT=['בראשית','נח','לך לך','וירא','חיי שרה','תולדות','ויצא','וישלח','וישב',
    'מקץ','ויגש','ויחי','שמות','וארא','בא','בשלח','יתרו','משפטים','תרומה','תצוה',
    'כי תשא','ויקהל','פקודי','ויקרא','צו','שמיני','תזריע','מצורע',
    'אחרי מות','קדושים','אמור','בהר','בחוקותי','במדבר','נשא','בהעלותך','שלח',
    'קרח','חקת','בלק','פינחס','מטות','מסעי','דברים','ואתחנן','עקב','ראה',
    'שופטים','כי תצא','כי תבוא','נצבים','וילך','האזינו','וזאת הברכה'];
  let book='שמות', parasha='לא ידוע';
  for(const b of BOOKS) if(filename.includes(b)){book=b;break;}
  const firstLines=text.split('\n').slice(0,5).join(' ');
  for(const b of BOOKS) if(firstLines.includes(b)){book=b;break;}
  for(const p of PARASHIYOT) if(filename.includes(p)&&p.length>2){parasha=p;break;}
  if(parasha==='לא ידוע') for(const p of PARASHIYOT) if(text.includes(p)&&p.length>2){parasha=p;break;}

  const strip=s=>s.replace(/[\u0591-\u05c7]/g,'');
  const getTaam=w=>{for(const ch of w)if(TAAM_MAP[ch])return TAAM_MAP[ch];return '';};
